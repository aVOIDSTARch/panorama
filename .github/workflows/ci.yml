name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust — check, test, clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (workspace)
        run: cargo check --workspace

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: cargo clippy (workspace)
        run: cargo clippy --workspace -- -D warnings

  cerebro:
    name: Cerebro — npm ci + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/cerebro
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/cerebro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build check
        run: npm run build --if-present

  cross-language-tokens:
    name: Cross-language token verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tsx
        run: npm install -g tsx

      - name: Generate fixture from Rust
        run: |
          cargo test -p cloak-tokens --lib -- --ignored --nocapture 2>/dev/null \
            | sed -n '/^{$/,/^}$/p' > tests/cross-language/fixture.json

      - name: Verify with Python
        run: python3 tests/cross-language/verify_token.py

      - name: Verify with TypeScript
        run: npx tsx tests/cross-language/verify_token.ts

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt check
        run: cargo fmt --all -- --check
